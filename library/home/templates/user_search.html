{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Search Books</title>
    <link rel="stylesheet" href="{% static 'css/user_search.css' %}">
    <script src="{% static 'js/user_borrow.js' %}"></script>
    <script src="{% static 'js/user_search.js' %}"></script>
</head>
<body>

<center>

    <h1>Library Management System</h1>
    <h2>Hello User</h2>

    <hr>

    <nav>
        <a href="{% url 'user_home' %}">Home</a> |
        <a href="{% url 'user_search' %}">Search</a> |
        <a href="{% url 'user_borrowed_books' %}">Borrowed Books</a> |
        <a href="{% url 'user_available_books' %}">Available Books</a> |
        <a href="#" id="logout-btn">Logout</a>
    </nav>

    <hr>

    <h2>Search Books</h2>

    <form id="searchForm">
        <input type="text" id="searchInput" placeholder="Search anything...">
        <button type="submit">Search</button>
    </form>

    <br>

    <table border="1" id="searchTable">
        <tr>
            <th>Cover</th>
            <th>Name</th>
            <th>Author</th>
            <th>Category</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </table>

    <hr>
    <p>© 2026 Library Management System</p>

</center>

</body>
</html>
