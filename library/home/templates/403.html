<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 — Forbidden</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0ebe3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .error-box {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 6px 28px rgba(0,0,0,0.10);
            padding: 56px 48px;
            max-width: 480px;
            width: 100%;
        }

        .error-code { font-size: 6rem; font-weight: 800; color: #2c2c2c; line-height: 1; margin-bottom: 12px; }
        .error-icon { font-size: 3rem; margin-bottom: 16px; }
        h2 { font-size: 1.4rem; color: #2c2c2c; margin-bottom: 10px; }
        p { color: #888; font-size: 0.95rem; line-height: 1.6; margin-bottom: 32px; }

        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: #2c2c2c;
            color: #fff;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s, transform 0.2s;
        }

        .btn:hover { background: #444; transform: translateY(-2px); }
        .footer { margin-top: 32px; color: #bbb; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="error-box">
        <div class="error-icon">🚫</div>
        <div class="error-code">403</div>
        <h2>Access Forbidden</h2>
        <p>You don't have permission to view this page.</p>
        <a href="/" class="btn">Go Back Home</a>
    </div>
    <p class="footer">© 2026 Library Management System</p>
</body>
</html>
